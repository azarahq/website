<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Exus // Azara — Pilot Links</title>
<meta name="description" content="A place to organize all links relevant for the Exus // Azara pilot conversation.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F5F0E8;
    --ink: #1A1814;
    --ink-hover: #2C261F;
    --muted: #7A7468;
    --accent: #A0522D;
    --rule: rgba(26, 24, 20, 0.10);
    --serif: 'Cormorant Garamond', 'EB Garamond', Garamond, Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.65;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: var(--accent); text-decoration: none; transition: color 0.15s ease; }
  a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 1px; }

  .container { max-width: 540px; margin: 0 auto; padding: 0 28px; width: 100%; }

  header { padding: 44px 0 0; }
  .brand { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 14px; }
  .brand__mark { display: block; line-height: 0; }
  .wordmark {
    font-family: var(--serif); font-size: 22px; font-weight: 500;
    letter-spacing: 0.02em; color: var(--ink);
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 64px 0;
  }

  .intro {
    font-family: var(--serif);
    font-size: 22px;
    line-height: 1.5;
    color: var(--muted);
    text-align: center;
    margin: 0 0 48px;
  }
  .intro em { font-style: normal; color: var(--ink); white-space: nowrap; }

  .links {
    list-style: none;
    margin: 0;
    padding: 0;
    border-top: 1px solid var(--rule);
  }
  .links li { border-bottom: 1px solid var(--rule); }
  .links a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 4px;
    color: var(--ink);
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 500;
    transition: color 0.15s ease;
  }
  .links a:hover { color: var(--accent); }
  .links a:hover .arrow { transform: translateX(3px); color: var(--accent); }
  .arrow {
    font-family: var(--sans);
    font-size: 18px;
    color: var(--muted);
    transition: transform 0.18s ease, color 0.15s ease;
  }

  footer {
    padding: 32px 0 40px;
    border-top: 1px solid var(--rule);
  }
  footer p { margin: 4px 0; font-size: 13px; color: var(--muted); font-family: var(--sans); text-align: center; }

  @media (max-width: 640px) {
    body { font-size: 18px; }
    .container { padding: 0 22px; }
    header { padding-top: 32px; }
    .intro { font-size: 19px; margin-bottom: 36px; }
    .links a { font-size: 19px; padding: 20px 4px; }
  }
</style>
</head>

<body>

<header>
  <div class="container">
    <a href="/" class="brand" aria-label="Azara — home">
      <span class="brand__mark" aria-hidden="true">
        <svg width="32" height="42" viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg"
             fill="none" stroke="#1A1814" stroke-width="1.1"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="16" cy="6" r="2.4"/>
          <line x1="16" y1="8.4" x2="6" y2="38"/>
          <line x1="16" y1="8.4" x2="26" y2="38"/>
          <line x1="12.5" y1="19" x2="19.5" y2="19"/>
          <line x1="5.4" y1="38.4" x2="6.6" y2="37.6"/>
          <line x1="25.4" y1="37.6" x2="26.6" y2="38.4"/>
        </svg>
      </span>
      <span class="wordmark">Azara</span>
    </a>
  </div>
</header>

<main>
  <div class="container">
    <p class="intro">A place to organize all links relevant for the <em>Exus // Azara</em> pilot conversation.</p>

    <ul class="links">
      <li>
        <a href="https://drive.google.com/file/d/1G7nTEuCgW_3m5STWJxoR9_9Ck-IKbSmr/view?usp=sharing" target="_blank" rel="noopener">
          <span>Presentation</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </li>
      <li>
        <a href="https://azarahq.com">
          <span>Website</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </li>
      <li>
        <a href="https://calendly.com/baioumy">
          <span>Book a call</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </li>
      <li>
        <a href="#">
          <span>Q&amp;A doc</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </li>
    </ul>
  </div>
</main>

<footer>
  <div class="container">
    <p>© 2026 Azara</p>
  </div>
</footer>

</body>
</html>
